services:
  - type: web
    name: mediroute-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATA_GO_KR_API_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: NAVER_SEARCH_CLIENT_ID
        sync: false
      - key: NAVER_SEARCH_CLIENT_SECRET
        sync: false
      - key: NAVER_MAPS_CLIENT_ID
        sync: false
      - key: NAVER_MAPS_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mediroute-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: mediroute-db
    plan: free
    databaseName: mediroute
